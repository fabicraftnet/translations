coding-error:
  message: "\n &c &m                   &c  ERROR &m                   \n&f\n &fOops,\
    \ it seems there was a problem executing &f%event% &7-> &f%action% &7(%x%,%y%,%z%)\n\
    \ \n&f Information: &6%error%\n \n &c &m                                     \
    \               \n&f"
  message-event-critical: "\n &4 &m          &4 CRITICAL ERROR &m          \n&f\n\
    \ &cATTENTION! &fThe world has been put into build mode because a serious issue\
    \ occurred during the execution of the code &f%event% &7(%x%,%y%,%z%)...\n \n\
    &f Information: &6%error%\n \n &4 &m                                         \
    \           \n&f"
  message-event: |-
    &6 Error &8| &fAn error occurred during the execution of the code &f%event% &7(%x%,%y%,%z%).
     &fError information: &6%error%
  message-compile: "\n &c &m                   &c  ERROR &m                   \n\
    &f\n &fA problem occurred while saving the block &7(%x%,%y%,%z%)\n \n&f Information:\
    \ &6%error%\n \n &c &m                                                    \n&f"
  unsupportedentityexception: Entity must be %type%, not %old%.
  unknownfunctionexception: Failed to launch function %name%, because it doesn't exist
    in code.
  unknownmethodexception: Failed to launch method %name%, because it doesn't exist
    in code.
  unknowncycleexception: Failed to start or end cycle %name%, because it doesn't exist
    in code.
  numberformatexception: A number was expected, but the item did not contain one.
    Check the items in the chest for this action.
  toolongtextexception: 'Too long text was tried to write to variable. Please substring
    it with variable action Substring text. '
  collectionwithcollectionexception: Tried to store a list as element of list. Use
    Merge Lists action instead.
  toomanyrepeatsexception: Too many repeats at once! Please add control action Wait
    to the end of repeat before closing piston.
  nottrustedlinkexception: Site %link% is not trusted by server. Please contact server
    admins.
  illegalargumentexception: An incorrect value was found in the chest. You might have
    specified a negative number, or a variable returned an incorrect value, or something
    couldn't be retrieved from the value. Check the chest's contents!
  nullpointerexception: Some value is null, such as a variable or event value. Perhaps
    you didn't set a variable, or the event value is not supported by this event.
  bad-piston: An extra piston was detected, which needs to be removed. If it’s not
    extra, select the condition type.
  indexoutofboundsexception: Values were expected in the chest, but they are either
    missing or insufficient. Check the items in the chest for this action!
  operations-limit: The code line was called multiple times in a row and reached the
    limit of %limit% calls. It seems there's a line that calls itself repeatedly.
    Find it and fix it. This line's execution has been stopped.
  errors-limit: Coding encountered too many errors in short time, please fix them.
  actions-limit: Coding encountered too many actions in short time, please reduce
    them.
  targets-changes-limit: Too many entities (%limit%) was added or removed in targets
    list with Select Target action. Reduce amount of selection or remove the mobs.
  unknown: 'Oops... It seems this is an unknown error, details: '
  unknown-block-detected: |-
    &f
    &6 Error &8| &fWhile saving coding blocks, some were found that were removed in updates. Click their sign and remove unnecessary chest contents (SHIFT+Right-click).
  unknown-block-coords: ' Block %category% &8-&7 %type%: &7(%x%, %y%, %z%)'
  unknown-layout: '&cThis block opened a menu without hints, as there is a problem
    loading them...'
  hover-message: '&fClick to teleport to the block.'
  temp-var-not-exists: The temporary value %variable% for this event was not found
    because the event is not compatible with this value. Replace the event with a
    more suitable one.
  toomanyopenedmenusexception: Opened too many menus for %player%. Please add cooldown
    between opening menus.
coding-debug:
  condition:
    returned-true: '&fCondition %type%&f executed, &aTrue&f.'
    returned-false: '&fCondition %type%&f did not execute, &cFalse&f.'
    opposed:
      'true': '&aYes'
      'false': '&cNo'
  hover:
    argument: '&7%name%: %type%&7 = &6%value%'
    executor: "&7Category: %category%\n&7Executor: %type%\n \n&7Actions to execute:\
      \ &e%actions%"
    action: "&7Category: %category%\n&7Action: %type%\n \n&7Arguments:\n%arguments%"
    condition: "&7Category: %category%\n&7Condition: %type%\n&7Opposed: %opposed%\n\
      \ \n&7Arguments:\n%arguments%"
  variable:
    set: '&fNew value for %variable%&f: &7%value%'
    created: '&fVariable %variable%&f created: &7%value%'
  log: '&8 [&6⌘&8] &f%log%'
  event-message: '&7 Event Call &8| &7Event %type%&f occurred, finding the trigger...'
  variable-found: '&7           %name% &a=&7 %value%'
  variable-not-found: '&7           %name% &cdefault&7: %value%'
  executor-message: '&7 &7%type%&7 &8(%x% %y% %z%)'
  action-message: '&7 | %type%&7 &8(%x% %y% %z%)'
  action-hover: '&7Type %type% &7Argument &6%name%&7 Value: &6%value%'
  parsing-code: '&fChecking code blocks, please wait...'
  parsed-code: '&fAll code blocks were checked in &6%time% seconds&f.'
  saving-code: '&f&nSaving the code&f...'
  saved-code: '&fThe code was saved in &6%time% seconds&f '
  loading-code: '&fLoading the code, please wait...'
  loaded-code: '&fThe code was &nloaded&f in &6%time% seconds&f '
coding-warning:
  message: "&f\n &8 [&6⚠&8] &f%warning% \n&f"
  variables-limit:
